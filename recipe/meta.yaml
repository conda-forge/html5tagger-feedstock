{% set name = "html5tagger" %}
{% set version = "1.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/html5tagger-{{ version }}.tar.gz
  sha256: d19e72e3dc794621abacfdabe6be9d18da8dbf58f6992c0695e92ade8fae5466

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools-scm
    - setuptools
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - html5tagger
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/sanic-org/html5tagger
  summary: Pythonic HTML generation/templating (no template files)
  license: Unlicense
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
